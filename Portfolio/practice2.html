<!DOCTYPE html>
<html>

<head>

    <title>Practice 2</title>

</head>

<body>

    <h1 id="message">Hello Andrew</h1>

    <button id="btn">

        Change Message

    </button>

    <script>

        let message = document.getElementById("message");

        let btn = document.getElementById("btn");

        btn.onclick = function(){

            message.innerHTML = "Welcome to JavaScript!";

        };

    </script>

</body>

</html>
